name: "Test and lint"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: "Run tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Install dependencies"
        uses: jdx/mise-action@v2
        with:
          cache: true
      - name: "Run test suite"
        run: |
          make test
      - name: "Save the result of test suite"
        run: |
          echo "Nothing to save"
  test-lint:
    name: "Linting"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Install dependencies"
        uses: jdx/mise-action@v2
        with:
          cache: true
      - name: "Run linting"
        run: |
          make lint
  test-coverage:
    name: "Test coverage"
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Run test coverage check"
        run: |
          make test-coverage
      - name: "Save the coverage check result"
        run: |
          echo "Nothing to save"
