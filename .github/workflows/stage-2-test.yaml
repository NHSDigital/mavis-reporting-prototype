name: "Test stage"

on:
  workflow_call:
    inputs:
      build_datetime:
        description: "Build datetime, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_timestamp:
        description: "Build timestamp, set by the CI/CD pipeline workflow"
        required: true
        type: string
      build_epoch:
        description: "Build epoch, set by the CI/CD pipeline workflow"
        required: true
        type: string
      nodejs_version:
        description: "Node.js version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      python_version:
        description: "Python version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      terraform_version:
        description: "Terraform version, set by the CI/CD pipeline workflow"
        required: true
        type: string
      version:
        description: "Version of the software, set by the CI/CD pipeline workflow"
        required: true
        type: string

jobs:
  test:
    name: "Run tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Install dependencies"
        uses: jdx/mise-action@v2
        with:
          cache: true
      - name: "Run test suite"
        env:
          SECRET_KEY: "${{ secrets.SECRET_KEY_FOR_TESTS }}"
        run: |
          make test
      - name: "Save the result of test suite"
        run: |
          echo "Nothing to save"
  test-lint:
    name: "Linting"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Run linting"
        run: |
          make test-lint
      - name: "Save the linting result"
        run: |
          echo "Nothing to save"
  test-coverage:
    name: "Test coverage"
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      - name: "Install dependencies"
        uses: jdx/mise-action@v2
        with:
          cache: true
      - name: "Run test coverage check"
        env:
            SECRET_KEY: "${{ secrets.SECRET_KEY_FOR_TESTS }}"
            FAIL_IF_UNDER: 80
        run: |
          make test-coverage
      - name: "Save the coverage check result"
        uses: actions/upload-artifact@v4
        id: upload-html-report-artifact-step
        if: always()
        with:
          name: coverage-html
          path: htmlcov
          retention-days: 10
        outputs:
          html_report_url: ${{ steps.upload-html-report-artifact-step.outputs.artifact-url }}
      - name: "Save the coverage check badge"
        uses: actions/upload-artifact@v4
        id: upload-coverage-badge-artifact-step
        if: always()
        with:
          name: coverage-badge
          path: coverage.svg
          retention-days: 10
        outputs:
          badge_url: ${{ steps.upload-coverage-badge-artifact-step.outputs.artifact-url }}
